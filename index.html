<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fennick MD — Daily Diagnostic</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --parchment:#f5edd0;
  --parchment-light:#fffbe8;
  --gold:#c8a040;
  --gold-light:#e8d060;
  --brown-dark:#3a1c08;
  --brown-mid:#7a5218;
  --brown-light:#9b7230;
  --tag-red-bg:#fde8d8;--tag-red-txt:#7a2808;--tag-red-brd:#d08858;
  --tag-blue-bg:#dce8f8;--tag-blue-txt:#18386a;--tag-blue-brd:#7898c8;
  --tag-green-bg:#dcf0dc;--tag-green-txt:#184818;--tag-green-brd:#68a868;
  --ok:#2a6a1a;--ok-bg:#e8f5e0;--ok-brd:#4a8a2a;
  --err:#b04020;--err-bg:#fde8d8;--err-brd:#c05030;
}
body{
  font-family:'Lora',Georgia,serif;
  background:var(--parchment);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:0 12px 60px;
}
.page{
  width:100%;max-width:680px;
  border-radius:14px;overflow:hidden;
  border:2px solid var(--brown-mid);
  margin-top:20px;
  background:var(--parchment);
}
.wood{position:relative;overflow:hidden}
.wood svg.grain{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.topbar{
  min-height:48px;padding:11px 22px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:2px solid var(--brown-mid);
}
.tlogo{color:#f0d898;font-size:16px;letter-spacing:.5px;text-shadow:0 1px 2px rgba(0,0,0,.4);position:relative}
.tsub{color:var(--gold);font-size:9px;letter-spacing:3px;margin-top:1px;position:relative}
.tright{display:flex;align-items:center;gap:10px;position:relative}
.streak-pill{font-size:11px;color:var(--gold);font-style:italic;display:none}
.streak-pill b{color:#f0d898}
.case-pill{background:var(--gold);color:var(--brown-dark);font-size:10px;padding:4px 14px;border-radius:20px;letter-spacing:1px;border:1px solid var(--gold-light)}
.scene{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  height:210px;overflow:hidden;
  border-bottom:2px solid var(--brown-mid);
  position:relative;background:#e8d488;
}
.scene-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
.scene-col{position:relative;z-index:1;display:flex;align-items:flex-end;justify-content:center;overflow:hidden}
.char-img{width:100%;height:210px;object-fit:contain;object-position:center bottom;display:block}
.char-empty{width:88px;height:170px;background:rgba(155,114,48,.1);border:2px dashed rgba(155,114,48,.25);border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center}
.char-empty span{color:rgba(80,40,0,.25);font-size:9px;letter-spacing:1px;text-align:center;line-height:1.8}
.bubble-col{position:relative;z-index:1;display:flex;flex-direction:column;justify-content:center;padding:14px 10px}
.speech{background:rgba(255,252,235,.97);border:2px solid var(--brown-mid);border-radius:12px;padding:13px 14px;position:relative}
.speech::after{content:'';position:absolute;top:50%;left:-11px;transform:translateY(-50%);border-top:9px solid transparent;border-bottom:9px solid transparent;border-right:11px solid var(--brown-mid)}
.speech::before{content:'';position:absolute;top:50%;left:-8px;transform:translateY(-50%);z-index:1;border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:9px solid rgba(255,252,235,.97)}
.speech-name{font-size:9px;color:#9b5010;letter-spacing:1.5px;margin-bottom:4px}
.speech-text{font-size:11.5px;color:#3a1e08;line-height:1.85;font-style:italic}
.woodbar{height:20px;border-top:2px solid var(--brown-mid);border-bottom:2px solid var(--brown-mid)}
.body{padding:16px 18px;display:flex;flex-direction:column;gap:13px}
.case-panel{background:var(--parchment-light);border:2px solid var(--brown-light);border-radius:11px;padding:15px;position:relative}
.case-panel::after{content:'';position:absolute;inset:4px;border:1px solid rgba(155,114,48,.15);border-radius:7px;pointer-events:none}
.case-ribbon{position:absolute;top:-1px;left:16px;background:var(--brown-light);color:var(--parchment);font-size:8px;letter-spacing:2px;padding:3px 12px;border-radius:0 0 7px 7px}
.case-title{font-size:14px;color:#4a2408;margin:10px 0 8px}
.case-body{font-size:12px;color:#3a1e08;line-height:2.1}
.case-body b{color:#8b3808}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.tag{font-size:10px;padding:3px 11px;border-radius:20px;border:1.5px solid}
.tag-red{background:var(--tag-red-bg);color:var(--tag-red-txt);border-color:var(--tag-red-brd)}
.tag-blue{background:var(--tag-blue-bg);color:var(--tag-blue-txt);border-color:var(--tag-blue-brd)}
.tag-green{background:var(--tag-green-bg);color:var(--tag-green-txt);border-color:var(--tag-green-brd)}
.pipe{display:flex;align-items:center}
.ps{height:7px;flex:1;background:var(--gold);border-top:1.5px solid #e8c060;border-bottom:1.5px solid #886010}
.pb{width:12px;height:12px;flex-shrink:0;background:var(--gold);border-radius:50%;border:2px solid #886010;position:relative}
.pb::after{content:'';position:absolute;top:50%;left:50%;width:3.5px;height:3.5px;background:#886010;border-radius:50%;transform:translate(-50%,-50%)}
.choices-label{font-size:8px;letter-spacing:3px;color:var(--brown-light);margin-bottom:9px;text-transform:uppercase}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.choice{background:var(--parchment-light);border:2px solid var(--gold);border-radius:10px;padding:13px;cursor:pointer;position:relative;overflow:hidden;text-align:left;transition:border-color .15s,transform .1s,background .15s}
.choice::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 6px,#b89030 6px,#b89030 8px)}
.choice:hover:not(.done){border-color:var(--brown-mid);background:#fef3d0;transform:translateY(-1px)}
.choice.correct{background:var(--ok-bg);border-color:var(--ok-brd);cursor:default}
.choice.wrong{background:var(--err-bg);border-color:var(--err-brd);cursor:default;opacity:.75}
.choice.done{cursor:default}
.cletter{display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:50%;background:var(--gold);color:var(--brown-dark);font-size:10px;margin-bottom:6px;border:1px solid var(--brown-light)}
.choice.correct .cletter{background:var(--ok-brd);color:#fff;border-color:var(--ok)}
.choice.wrong .cletter{background:var(--err-brd);color:#fff;border-color:var(--err)}
.cdrug{font-size:13px;color:#4a2408;margin-bottom:2px}
.cclass{font-size:10px;color:var(--brown-light);font-style:italic}
.hint-row{display:flex;justify-content:flex-end}
.hint-btn{background:var(--gold);color:var(--brown-dark);border:1.5px solid var(--gold-light);padding:7px 18px;border-radius:20px;font-family:'Lora',serif;font-size:12px;cursor:pointer;transition:background .15s}
.hint-btn:hover{background:var(--gold-light)}
.hint-btn:disabled{opacity:.45;cursor:default}
.reveal{display:none;background:var(--parchment-light);border:2px solid var(--brown-light);border-radius:10px;padding:14px;font-size:12.5px;color:#3a1e08;line-height:1.9}
.reveal.show{display:block;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.rhead-ok{color:var(--ok);font-size:13px;margin-bottom:8px}
.rhead-err{color:var(--err);font-size:13px;margin-bottom:8px}
.rdivider{height:1px;background:rgba(155,114,48,.2);margin:10px 0}
.ritem{margin-bottom:8px}
.rdrug{font-size:11px;font-weight:500;color:#5a2e08;margin-bottom:2px}
.rtext{font-size:11.5px;color:#4a3020;line-height:1.8}
.played-card{background:var(--parchment-light);border:2px solid var(--brown-light);border-radius:11px;padding:24px;text-align:center}
.played-card .icon{font-size:28px;margin-bottom:10px}
.played-card h3{font-size:14px;color:#4a2408;margin-bottom:8px}
.played-ans{display:inline-block;margin-bottom:12px;font-size:12px;padding:6px 18px;border-radius:999px;background:var(--tag-green-bg);border:1px solid var(--tag-green-brd);color:var(--tag-green-txt)}
.played-card p{font-size:12px;color:var(--brown-light);line-height:1.9;margin-bottom:16px}
.played-card button{background:var(--gold);color:var(--brown-dark);border:1.5px solid var(--gold-light);padding:8px 20px;border-radius:20px;font-family:'Lora',serif;font-size:12px;cursor:pointer}
.bottombar{min-height:46px;padding:10px 22px;display:flex;align-items:center;justify-content:space-between}
.bstreak{font-size:11px;color:#d4b850;font-style:italic;position:relative}
.bstreak b{color:#f0d898}
.archive-btn{font-size:11px;color:var(--gold);background:none;border:none;font-family:'Lora',serif;cursor:pointer;letter-spacing:.5px;border-bottom:1px solid rgba(200,160,64,.3);transition:color .15s;position:relative}
.archive-btn:hover{color:#f0d898}
#archive-page{display:none}
.archive-grid{padding:16px 18px;display:flex;flex-direction:column;gap:8px}
.aitem{background:var(--parchment-light);border:1.5px solid var(--brown-light);border-radius:10px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s,background .15s}
.aitem:hover{border-color:var(--brown-mid);background:#fef3d0}
.aitem-left{display:flex;flex-direction:column;gap:3px}
.aitem-title{font-size:13px;color:#4a2408}
.aitem-date{font-size:10px;color:var(--brown-light);letter-spacing:.5px}
.aitem-right{display:flex;align-items:center;gap:8px}
.aitem-badge{font-size:10px;padding:3px 10px;border-radius:20px;background:var(--tag-green-bg);color:var(--tag-green-txt);border:1px solid var(--tag-green-brd)}
.aitem-arrow{color:var(--brown-light);font-size:14px}
.back-btn{background:none;border:none;color:var(--gold);font-family:'Lora',serif;font-size:12px;cursor:pointer;position:relative}
.back-btn:hover{color:#f0d898}
.played-banner{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--parchment-light);border:1.5px solid var(--brown-light);
  border-radius:10px;padding:11px 16px;font-size:12px;color:var(--brown-mid);font-style:italic;
}
.played-banner button{
  background:var(--gold);color:var(--brown-dark);
  border:1.5px solid var(--gold-light);padding:5px 14px;
  border-radius:20px;font-family:'Lora',serif;font-size:11px;cursor:pointer;
}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:9px;font-size:12px;font-family:'Lora',serif;color:#f0d898;background:var(--brown-dark);border:1px solid var(--gold);z-index:999;display:none;white-space:nowrap}
@keyframes toastAnim{0%{opacity:0;transform:translateX(-50%) translateY(6px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}
@media(max-width:480px){.choices{grid-template-columns:1fr}.scene{grid-template-columns:90px 1fr 90px}}
</style>
</head>
<body>
<div id="toast"></div>

<div id="game-page">
  <div class="page">
    <div class="topbar wood">
      <svg class="grain" viewBox="0 0 680 48" preserveAspectRatio="xMidYMid slice">
        <rect width="680" height="48" fill="#3a1c08"/>
        <path d="M0 8 Q170 4 340 8 Q510 12 680 8" stroke="rgba(255,200,100,0.07)" stroke-width="2.5" fill="none"/>
        <path d="M0 18 Q170 13 340 18 Q510 23 680 16" stroke="rgba(0,0,0,0.09)" stroke-width="2" fill="none"/>
        <path d="M0 28 Q170 23 340 29 Q510 35 680 27" stroke="rgba(255,200,100,0.06)" stroke-width="3" fill="none"/>
        <path d="M0 38 Q170 33 340 39 Q510 45 680 37" stroke="rgba(0,0,0,0.08)" stroke-width="2" fill="none"/>
      </svg>
      <div style="position:relative">
        <div class="tlogo">Fennick MD</div>
        <div class="tsub">Daily Diagnostic</div>
      </div>
      <div class="tright">
        <div class="streak-pill" id="streak-pill">🔥 <b id="streak-val">0</b> days</div>
        <div class="case-pill" id="case-pill">Case no. —</div>
      </div>
    </div>

    <div class="scene">
      <img class="scene-bg" src="https://res.cloudinary.com/djiap51xq/image/upload/q_auto/f_auto/v1775179062/Background_n0pwly.png" alt="" onerror="this.style.display='none'">
      <div class="scene-col">
        <img class="char-img" src="https://res.cloudinary.com/djiap51xq/image/upload/w_220,h_210,c_pad,g_south/q_auto/f_auto/v1775183043/DRDEFAULT_mpikmc.png" alt="Dr. Fennick" onerror="this.style.display='none'">
      </div>
      <div class="bubble-col">
        <div class="speech">
          <div class="speech-name">Dr. Fennick</div>
          <div class="speech-text" id="speech-text">"Welcome. Today's case is loading..."</div>
        </div>
      </div>
      <div class="scene-col" id="patient-col">
        <div class="char-empty"><span>Today's<br>patient</span></div>
      </div>
    </div>

    <div class="woodbar wood">
      <svg class="grain" viewBox="0 0 680 20" preserveAspectRatio="xMidYMid slice">
        <rect width="680" height="20" fill="#b8891e"/>
        <path d="M0 4 Q170 1 340 5 Q510 9 680 4" stroke="rgba(255,220,120,0.12)" stroke-width="2" fill="none"/>
        <path d="M0 10 Q170 6 340 11 Q510 16 680 10" stroke="rgba(0,0,0,0.09)" stroke-width="1.5" fill="none"/>
        <path d="M0 16 Q170 12 340 17 Q510 22 680 15" stroke="rgba(255,220,120,0.08)" stroke-width="2" fill="none"/>
      </svg>
    </div>

    <div class="body" id="game-body">
      <div class="case-panel">
        <div class="case-ribbon" id="case-ribbon">loading...</div>
        <div class="case-title" id="case-title">Loading today's case...</div>
        <div class="case-body" id="case-body"></div>
        <div class="tags" id="case-tags"></div>
      </div>

      <div class="pipe">
        <div class="pb"></div><div class="ps"></div><div class="pb"></div><div class="ps"></div>
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="flex-shrink:0;margin:0 3px">
          <circle cx="10" cy="10" r="8" fill="#c8a850" stroke="#886010" stroke-width="1.8"/>
          <circle cx="10" cy="10" r="3.5" fill="#886010"/>
          <line x1="10" y1="2" x2="10" y2="5" stroke="#886010" stroke-width="2" stroke-linecap="round"/>
          <line x1="10" y1="15" x2="10" y2="18" stroke="#886010" stroke-width="2" stroke-linecap="round"/>
          <line x1="2" y1="10" x2="5" y2="10" stroke="#886010" stroke-width="2" stroke-linecap="round"/>
          <line x1="15" y1="10" x2="18" y2="10" stroke="#886010" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="ps"></div><div class="pb"></div><div class="ps"></div><div class="pb"></div>
      </div>

      <div>
        <div class="choices-label">Choose the first-line treatment</div>
        <div class="choices" id="choices"></div>
      </div>

      <div class="hint-row">
        <button class="hint-btn" id="hint-btn" onclick="showHint()">Ask Dr. Fennick</button>
      </div>

      <div class="reveal" id="reveal"></div>
    </div>

    <div class="bottombar wood">
      <svg class="grain" viewBox="0 0 680 46" preserveAspectRatio="xMidYMid slice">
        <rect width="680" height="46" fill="#3a1c08"/>
        <path d="M0 8 Q170 4 340 9 Q510 14 680 8" stroke="rgba(255,200,100,0.07)" stroke-width="2.5" fill="none"/>
        <path d="M0 22 Q170 17 340 23 Q510 29 680 21" stroke="rgba(255,200,100,0.06)" stroke-width="3" fill="none"/>
        <path d="M0 36 Q170 31 340 37 Q510 43 680 35" stroke="rgba(0,0,0,0.08)" stroke-width="2" fill="none"/>
      </svg>
      <div class="bstreak">Streak <b id="bottom-streak">0</b> days 🔥</div>
      <button class="archive-btn" onclick="showArchive()">Archive →</button>
    </div>
  </div>
</div>

<div id="archive-page">
  <div class="page">
    <div class="topbar wood">
      <svg class="grain" viewBox="0 0 680 48" preserveAspectRatio="xMidYMid slice">
        <rect width="680" height="48" fill="#3a1c08"/>
        <path d="M0 18 Q170 13 340 18 Q510 23 680 16" stroke="rgba(0,0,0,0.09)" stroke-width="2" fill="none"/>
        <path d="M0 32 Q170 27 340 33 Q510 39 680 31" stroke="rgba(255,200,100,0.06)" stroke-width="3" fill="none"/>
      </svg>
      <button class="back-btn" onclick="showGame()">← Back</button>
      <div class="tlogo" style="position:relative;font-size:14px">Case Archive</div>
      <div style="width:60px"></div>
    </div>
    <div class="woodbar wood">
      <svg class="grain" viewBox="0 0 680 20" preserveAspectRatio="xMidYMid slice">
        <rect width="680" height="20" fill="#b8891e"/>
        <path d="M0 10 Q170 6 340 11 Q510 16 680 10" stroke="rgba(0,0,0,0.09)" stroke-width="1.5" fill="none"/>
      </svg>
    </div>
    <div class="archive-grid" id="archive-grid"></div>
    <div class="bottombar wood">
      <svg class="grain" viewBox="0 0 680 46" preserveAspectRatio="xMidYMid slice">
        <rect width="680" height="46" fill="#3a1c08"/>
        <path d="M0 22 Q170 17 340 23 Q510 29 680 21" stroke="rgba(255,200,100,0.06)" stroke-width="3" fill="none"/>
      </svg>
      <div class="bstreak">Streak <b id="arc-streak">0</b> days 🔥</div>
      <span style="font-size:11px;color:var(--gold);font-style:italic;position:relative">Past cases</span>
    </div>
  </div>
</div>

<script>
let allCases = [], allExplanations = {}, currentCase = null, answered = false, hintUsed = false, wrongAttempts = new Set();


const FOX_FACES = {
  default:     'https://res.cloudinary.com/djiap51xq/image/upload/w_220,h_210,c_pad,g_south/q_auto/f_auto/v1775183043/DRDEFAULT_mpikmc.png',
  success:     'https://res.cloudinary.com/djiap51xq/image/upload/w_220,h_210,c_pad,g_south/q_auto/f_auto/v1775189999/success_liqvnd.png',
  one_wrong:   'https://res.cloudinary.com/djiap51xq/image/upload/w_220,h_210,c_pad,g_south/q_auto/f_auto/v1775189988/one_wrong_fboh0v.png',
  two_wrong:   'https://res.cloudinary.com/djiap51xq/image/upload/w_220,h_210,c_pad,g_south/q_auto/f_auto/v1775189991/two_wrong_rhki4f.png',
  three_wrong: 'https://res.cloudinary.com/djiap51xq/image/upload/w_220,h_210,c_pad,g_south/q_auto/f_auto/v1775189995/three_wrong_pfjk6i.png'
};
function setFoxFace(face) {
  const img = document.querySelector("#game-page .scene-col:first-child .char-img");
  if (img) img.src = FOX_FACES[face] || FOX_FACES.default;
}
function todayCST() {
  return new Intl.DateTimeFormat('en-CA', {
    timeZone:'America/Chicago', year:'numeric', month:'2-digit', day:'2-digit'
  }).format(new Date());
}
function getStreak() { return parseInt(localStorage.getItem('fmd_streak') || '0'); }
function getLastPlayed() { return localStorage.getItem('fmd_last') || ''; }
function updateStreak() {
  const today = todayCST(), last = getLastPlayed();
  const yest = new Intl.DateTimeFormat('en-CA', {
    timeZone:'America/Chicago', year:'numeric', month:'2-digit', day:'2-digit'
  }).format(new Date(Date.now() - 86400000));
  if (last === today) return getStreak();
  const s = last === yest ? getStreak() + 1 : 1;
  localStorage.setItem('fmd_streak', s);
  localStorage.setItem('fmd_last', today);
  return s;
}
function renderStreak() {
  const s = getStreak();
  ['streak-val','bottom-streak','arc-streak'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = s;
  });
  if (s > 0) { const p = document.getElementById('streak-pill'); if (p) p.style.display = 'flex'; }
}
function getPlayed() {
  try { return JSON.parse(localStorage.getItem('fmd_played') || '{}'); } catch(e) { return {}; }
}
function markPlayed(id, correct) {
  const p = getPlayed(); p[id] = { correct, date: todayCST() };
  localStorage.setItem('fmd_played', JSON.stringify(p));
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  t.style.animation = 'none'; void t.offsetHeight;
  t.style.animation = 'toastAnim 2.4s ease-in-out';
  setTimeout(() => t.style.display = 'none', 2400);
}

async function init() {
  try {
    const [casesRes, expRes] = await Promise.all([
      fetch('cases.json'),
      fetch('explanations.json')
    ]);
    if (!casesRes.ok) throw new Error('cases.json HTTP ' + casesRes.status);
    allCases = await casesRes.json();
    if (expRes.ok) allExplanations = await expRes.json();
  } catch(e) {
    console.error('Load failed:', e);
    document.getElementById('case-title').textContent = 'Could not load cases. Make sure cases.json and explanations.json are in the same folder on GitHub.';
    return;
  }
  const today = todayCST();
  currentCase = allCases.find(c => c.date === today) || allCases[allCases.length - 1];
  if (currentCase) renderGame(currentCase, false);
  renderStreak();
}

function renderGame(c, isArchive) {
  currentCase = c; answered = false; hintUsed = false; wrongAttempts = new Set(); setFoxFace('default');
  document.getElementById('case-pill').textContent = 'Case no. ' + c.id;
  document.getElementById('case-ribbon').textContent = 'case file — no. ' + c.id;
  document.getElementById('case-title').textContent = c.title;
  document.getElementById('case-body').innerHTML = c.body;
  document.getElementById('speech-text').textContent = '"' + c.title + '. A curious case. Study the details carefully before you choose."';
  document.getElementById('case-tags').innerHTML = c.tags.map(t =>
    `<span class="tag tag-${t.type}">${t.label}</span>`).join('');
  const col = document.getElementById('patient-col');
  col.innerHTML = c.patient_img
    ? `<img class="char-img" src="${c.patient_img}" alt="Patient" onerror="this.style.display='none'">`
    : `<div class="char-empty"><span>Today's<br>patient</span></div>`;
  document.getElementById('choices').innerHTML = c.options.map((o, i) =>
    `<div class="choice" id="ch${i}" onclick="pick(${i})">
      <div class="cletter">${'ABCD'[i]}</div>
      <div class="cdrug">${o.drug}</div>
      <div class="cclass">${o.class}</div>
    </div>`).join('');
  const rev = document.getElementById('reveal');
  rev.className = 'reveal'; rev.innerHTML = ''; rev.style.display = 'none';
  const hb = document.getElementById('hint-btn');
  hb.disabled = false; hb.textContent = 'Ask Dr. Fennick';
  const old = document.querySelector('.played-card'); if (old) old.remove();
  if (!isArchive) { const p = getPlayed(); if (p[c.id]) showAlreadyPlayed(c, p[c.id].correct); }
}

function pick(idx) {
  if (answered) return;
  const c = currentCase, chosen = c.options[idx], correct = chosen.drug === c.answer;
  const el = document.getElementById('ch' + idx);

  if (!correct) {
    el.classList.add('wrong', 'done');
    wrongAttempts.add(idx);
    const wCount = wrongAttempts.size;

    if (wCount === 1) {
      setFoxFace('one_wrong');
      document.getElementById('speech-text').textContent = '"Hmm. Not that one. Look more carefully at the patient\'s history."';
    } else if (wCount === 2) {
      setFoxFace('two_wrong');
      document.getElementById('speech-text').textContent = '"Two wrong. There is a clear answer here — re-read every detail."';
    } else if (wCount >= 3) {
      setFoxFace('three_wrong');
      answered = true;
      // Lock all remaining choices
      c.options.forEach((o, i) => {
        const el2 = document.getElementById('ch' + i);
        if (el2) { el2.classList.add('done'); if (o.drug === c.answer) el2.classList.add('correct'); }
      });
      markPlayed(c.id, false);
      renderStreak();
      showReveal(c.answer);
      document.getElementById('speech-text').textContent = '"Oh dear... three wrong turns. The answer was ' + c.answer + '. Study this one carefully before tomorrow."';
      return;
    }

    showWrongReveal(chosen.drug);
    return;
  }

  // Correct — lock everything, show full reveal
  answered = true;
  c.options.forEach((o, i) => {
    const el2 = document.getElementById('ch' + i);
    el2.classList.add('done');
    if (o.drug === c.answer) el2.classList.add('correct');
  });
  setFoxFace('success');
  updateStreak();
  markPlayed(c.id, true);
  renderStreak();
  showReveal(chosen.drug);
  document.getElementById('speech-text').textContent = `"Precisely. ${c.answer} — the correct first-line choice. Well reasoned."`;
}

function showWrongReveal(chosenDrug) {
  const c = currentCase, rev = document.getElementById('reveal');
  const exp = allExplanations[c.answer] || {};
  const wrongText = exp.wrong ? exp.wrong[chosenDrug] : '';
  rev.style.borderColor = 'var(--err-brd)';
  rev.innerHTML = `<div class="rhead-err">✗ ${chosenDrug} — not quite</div><div>${wrongText||'Not the right choice for this patient.'}</div>`;
  rev.style.display = 'block'; rev.classList.add('show');
  setTimeout(() => rev.scrollIntoView({ behavior:'smooth', block:'nearest' }), 50);
}

function showReveal(chosenDrug) {
  const c = currentCase, rev = document.getElementById('reveal');
  const exp = allExplanations[c.answer] || {};
  rev.style.borderColor = 'var(--ok-brd)';
  let html = `<div class="rhead-ok">✓ Correct — ${c.answer}</div>`;
  if (exp.correct) html += `<div>${exp.correct}</div>`;
  html += `<div class="rdivider"></div>`;
  if (exp.mechanism) html += `<div class="ritem"><div class="rdrug">Mechanism</div><div class="rtext">${exp.mechanism}</div></div>`;
  if (exp.clinical_use) html += `<div class="ritem"><div class="rdrug">Clinical use</div><div class="rtext">${exp.clinical_use}</div></div>`;
  if (exp.key_facts) html += `<div class="ritem"><div class="rdrug">Key facts</div><div class="rtext">${exp.key_facts}</div></div>`;
  html += `<div class="rdivider"></div>`;
  c.options.filter(o => o.drug !== c.answer).forEach(o => {
    const wrongExp = exp.wrong ? exp.wrong[o.drug] : (allExplanations[o.drug] ? allExplanations[o.drug].why_wrong : '');
    html += `<div class="ritem"><div class="rdrug">Why not ${o.drug}?</div><div class="rtext">${wrongExp||''}</div></div>`;
  });
  rev.innerHTML = html; rev.style.display = 'block'; rev.classList.add('show');
  setTimeout(() => rev.scrollIntoView({ behavior:'smooth', block:'nearest' }), 50);
}

function showHint() {
  if (hintUsed) return; hintUsed = true;
  document.getElementById('speech-text').textContent = '"' + currentCase.fennick_hint + '"';
  const hb = document.getElementById('hint-btn'); hb.disabled = true; hb.textContent = 'Hint revealed';
  toast('Dr. Fennick speaks...');
}

function showAlreadyPlayed(c, wasCorrect) {
  answered = true;
  document.getElementById('hint-btn').disabled = true;

  // Show all choices with correct highlighted
  c.options.forEach((o, i) => {
    const el = document.getElementById('ch' + i);
    if (el) {
      el.classList.add('done');
      if (o.drug === c.answer) el.classList.add('correct');
    }
  });

  // Show full explanation
  showReveal(c.answer);

  // Add played banner above case panel
  const body = document.getElementById('game-body');
  const banner = document.createElement('div');
  banner.className = 'played-banner';
  banner.innerHTML = `<span>${wasCorrect ? '✓ You got this one right.' : '✗ You missed this one.'}</span><button onclick="showArchive()">Browse Archive →</button>`;
  body.insertBefore(banner, body.firstChild);
}

function showArchive() {
  document.getElementById('game-page').style.display = 'none';
  document.getElementById('archive-page').style.display = 'block';
  renderStreak();
  const played = getPlayed(), today = todayCST();
  const past = allCases.filter(c => c.date <= today).sort((a,b) => b.date.localeCompare(a.date));
  const grid = document.getElementById('archive-grid');
  if (!past.length) { grid.innerHTML = '<div style="text-align:center;padding:32px;font-size:13px;color:var(--brown-light);font-style:italic">No past cases yet.</div>'; return; }
  grid.innerHTML = past.map(c => {
    const p = played[c.id];
    const dateStr = new Date(c.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    return `<div class="aitem" onclick="loadArchive('${c.id}')">
      <div class="aitem-left"><div class="aitem-title">${c.title}</div><div class="aitem-date">${c.date===today?'Today — ':''}${dateStr}</div></div>
      <div class="aitem-right">${p?`<span class="aitem-badge">${p.correct?'✓':'✗'} Played</span>`:''}<span class="aitem-arrow">›</span></div>
    </div>`;
  }).join('');
}

function loadArchive(id) {
  const c = allCases.find(x => x.id === id); if (!c) return;
  showGame(); renderGame(c, true);
  const p = getPlayed();
  if (p[id]) {
    answered = true;
    c.options.forEach((o,i) => { const el = document.getElementById('ch'+i); if(el){el.classList.add('done');if(o.drug===c.answer)el.classList.add('correct');} });
    if (p[id].correct) showReveal(c.answer); else { document.getElementById('reveal').style.display='none'; }
  }
}

function showGame() {
  document.getElementById('archive-page').style.display = 'none';
  document.getElementById('game-page').style.display = 'block';
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
