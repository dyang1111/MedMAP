<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fennick MD — Archives</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

html,body{
  height:100%;
  font-family:'Crimson Pro',Georgia,serif;
  background-color:#2a1a06;
  color:#e8c87a;
}

/* ── TOWN BG ── */
#bg{
  position:fixed;inset:0;z-index:0;
  background-size:cover;background-position:center;background-attachment:fixed;
  background-image:url('https://res.cloudinary.com/djiap51xq/image/upload/q_auto/f_auto/v1775527232/background_ui_tl1rgz.png');
}

/* ── NAV ── */
.fm-nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:10px 24px;height:52px;
  display:flex;justify-content:space-between;align-items:center;
  background-color:#3e1e08;
  background-image:repeating-linear-gradient(179deg,transparent 0px,transparent 3px,rgba(255,180,80,0.06) 3px,rgba(255,180,80,0.06) 4px,transparent 4px,transparent 9px,rgba(0,0,0,0.08) 9px,rgba(0,0,0,0.08) 10px,transparent 10px,transparent 18px),linear-gradient(176deg,#522a0c 0%,#3c1a06 15%,#4e2608 30%,#3a1605 45%,#4c2208 60%,#3c1a06 75%,#4a2008 100%);
  border-bottom:2px solid #7a4a12;
}
.fm-logo{color:#e8c87a;font-family:'Playfair Display',serif;font-size:17px;font-weight:600;display:flex;align-items:center;gap:8px;text-decoration:none}
.fm-logo svg{color:#c8a45a}
.fm-logo small{color:#b09050;font-size:10px;display:block;letter-spacing:.15em;font-style:italic;font-weight:400;margin-top:1px}
.fm-nav-pill{color:#e8c87a;font-size:12px;border:1px solid #8b6914;border-radius:20px;padding:3px 12px;background:rgba(0,0,0,0.25);cursor:pointer;font-family:'Crimson Pro',Georgia,serif;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.fm-nav-pill:hover{background:rgba(0,0,0,0.4)}

/* ── MAIN ── */
#app{
  position:relative;z-index:10;
  padding-top:72px;
  padding-bottom:48px;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

/* ── PAPER CONTAINER ── */
.archives-container{
  width:100%;
  max-width:700px;
  padding:0 16px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* ── PAGE HEADER PANEL ── */
.page-header{
  background:rgba(252,248,225,0.95);
  border:1px solid rgba(140,100,30,0.28);
  border-radius:6px;
  padding:20px 22px;
  box-shadow:1px 2px 10px rgba(60,30,0,0.18);
  background-image:url('https://res.cloudinary.com/djiap51xq/image/upload/q_auto/f_auto/v1775598232/Gemini_Generated_Image_3h2n6k3h2n6k3h2n_rbyyg4_a_90_km2htn.png');
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
}
.page-header-inner{position:relative;z-index:1;}
.page-header-eyebrow{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;
  color:#7a5010;margin-bottom:6px;
}
.page-header-title{
  font-family:'Playfair Display',serif;font-size:26px;font-weight:600;
  color:#2a1a06;margin-bottom:6px;
}
.page-header-sub{font-size:14px;color:#7a5010;line-height:1.6;}

/* ── SEARCH + FILTER ── */
.search-bar{
  background:rgba(252,248,225,0.95);
  border:1px solid rgba(140,100,30,0.28);
  border-radius:6px;
  padding:12px 16px;
  box-shadow:1px 2px 10px rgba(60,30,0,0.18);
  display:flex;gap:10px;align-items:center;
}
.search-bar input{
  flex:1;padding:8px 12px;
  background:rgba(255,255,255,0.6);
  border:1px solid rgba(160,120,40,0.35);
  border-radius:6px;
  font-family:'Crimson Pro',Georgia,serif;
  font-size:14px;color:#2a1a06;
  outline:none;
  font-style:italic;
}
.search-bar input:focus{border-color:rgba(160,120,40,0.7);background:rgba(255,255,255,0.85);}
.search-bar input::placeholder{color:#a08040;}
.count-lbl{
  color:#7a5010;font-size:13px;white-space:nowrap;
}

/* ── STATS ROW ── */
.stats-row{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
}
.stat-card{
  background:rgba(252,248,225,0.95);
  border:1px solid rgba(140,100,30,0.28);
  border-radius:6px;padding:12px;
  text-align:center;
  box-shadow:1px 2px 10px rgba(60,30,0,0.18);
}
.stat-val{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:600;color:#2a1a06;
}
.stat-lbl{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:#7a5010;margin-top:2px;
}

/* ── SECTION LABEL ── */
.section-lbl{
  display:inline-block;background:#3a1a06;color:#e8c87a;
  font-size:10px;letter-spacing:.14em;padding:3px 10px;border-radius:4px;
}

/* ── CASE LIST ── */
.case-list{display:flex;flex-direction:column;gap:8px;}

/* ── CASE ROW ── */
.case-row{
  background:rgba(252,248,225,0.95);
  border:1px solid rgba(140,100,30,0.28);
  border-radius:6px;padding:14px 16px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;
  transition:background .15s,border-color .15s,transform .1s;
  box-shadow:1px 2px 8px rgba(60,30,0,0.12);
  position:relative;overflow:hidden;
}
.case-row:hover{
  background:rgba(252,248,225,1);
  border-color:rgba(160,120,40,0.55);
  transform:translateY(-1px);
  box-shadow:1px 4px 14px rgba(60,30,0,0.2);
}
.case-row:active{transform:translateY(0);}

/* Date badge */
.date-badge{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(58,26,6,0.08);
  border:1px solid rgba(160,120,40,0.3);
  border-radius:6px;padding:6px 9px;
  min-width:46px;flex-shrink:0;text-align:center;
}
.date-mon{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7a5010;}
.date-day{font-size:18px;font-weight:600;color:#2a1a06;line-height:1;font-family:'Playfair Display',serif;}
.date-year{font-size:9px;color:#a08040;margin-top:1px;}

/* Case info */
.case-info{flex:1;min-width:0;}
.case-title{
  font-family:'Playfair Display',serif;font-size:16px;font-weight:600;
  color:#2a1a06;margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.case-meta{font-size:13px;color:#7a5010;line-height:1.4;}
.case-tag{
  display:inline-block;
  background:#3a1a06;color:#e8c87a;
  font-size:10px;letter-spacing:.1em;
  padding:2px 7px;border-radius:3px;
  margin-top:5px;
}

/* Play button */
.case-play-btn{
  background:#3a1a06;color:#e8c87a;
  border:none;border-radius:6px;
  padding:8px 16px;
  font-family:'Crimson Pro',Georgia,serif;
  font-size:13px;font-weight:600;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:background .15s;
}
.case-play-btn:hover{background:#5a2a0a;}

/* ── EMPTY STATE ── */
.empty-state{
  background:rgba(252,248,225,0.95);
  border:1px solid rgba(140,100,30,0.28);
  border-radius:6px;padding:48px 24px;
  text-align:center;
  box-shadow:1px 2px 10px rgba(60,30,0,0.18);
}
.empty-icon{font-size:2.5rem;margin-bottom:12px;}
.empty-title{font-family:'Playfair Display',serif;font-size:18px;color:#2a1a06;margin-bottom:6px;}
.empty-sub{font-size:14px;color:#7a5010;line-height:1.6;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:rgba(62,30,8,0.1);}
::-webkit-scrollbar-thumb{background:rgba(160,120,40,0.5);border-radius:4px;}
</style>
</head>
<body>

<div id="bg"></div>

<nav class="fm-nav">
  <a class="fm-logo" href="index.html">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    Fennick MD
    <small>Archives</small>
  </a>
  <a class="fm-nav-pill" href="index.html">
    ← Today's Case
  </a>
</nav>

<div id="app">
  <div class="archives-container">

    <div class="page-header">
      <div class="page-header-inner">
        <div class="page-header-eyebrow">Fennick MD</div>
        <div class="page-header-title">Clinical Archives</div>
        <div class="page-header-sub">Every past case. Study the presentations, revisit the diagnoses, sharpen your clinical eye.</div>
      </div>
    </div>

    <div class="stats-row" id="stats-row" style="display:none">
      <div class="stat-card"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Total Cases</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-month">—</div><div class="stat-lbl">This Month</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-latest">—</div><div class="stat-lbl">Latest</div></div>
    </div>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search by title, date, patient..." oninput="filterCases()">
      <span class="count-lbl" id="count-lbl"></span>
    </div>

    <div class="section-lbl" id="list-lbl">Past Cases</div>
    <div class="case-list" id="case-list">
      <div class="empty-state">
        <div class="empty-icon">⏳</div>
        <div class="empty-title">Loading cases...</div>
      </div>
    </div>

  </div>
</div>

<script>
let allCases = [];

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function getTodayCST(){
  return new Intl.DateTimeFormat('en-CA',{timeZone:'America/Chicago',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());
}

async function loadCases(){
  try{
    const res = await fetch('cases.json');
    if(!res.ok) throw new Error();
    const cases = await res.json();
    const today = getTodayCST();
    // Only show past cases (not today's)
    allCases = cases
      .filter(c => c.date < today)
      .sort((a,b) => b.date.localeCompare(a.date));
    updateStats(cases, today);
    renderList(allCases);
  }catch(e){
    document.getElementById('case-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Could not load cases</div>
        <div class="empty-sub">Make sure cases.json is in the same folder and you're running a local server.</div>
      </div>`;
  }
}

function updateStats(cases, today){
  const past = cases.filter(c => c.date < today);
  if(past.length === 0) return;
  document.getElementById('stats-row').style.display = 'grid';
  document.getElementById('stat-total').textContent = past.length;
  const thisMonth = today.slice(0,7);
  const monthCount = past.filter(c => c.date.startsWith(thisMonth)).length;
  document.getElementById('stat-month').textContent = monthCount;
  const latest = past[0];
  if(latest){
    const parts = latest.date.split('-');
    document.getElementById('stat-latest').textContent = MONTHS[parseInt(parts[1])-1] + ' ' + parseInt(parts[2]);
  }
}

window.filterCases = function(){
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  if(!q){ renderList(allCases); return; }
  const filtered = allCases.filter(c =>
    (c.title||'').toLowerCase().includes(q) ||
    (c.date||'').includes(q) ||
    (c.patient?.name||'').toLowerCase().includes(q) ||
    (c.patient?.occupation||'').toLowerCase().includes(q) ||
    (c.dx_answer||'').toLowerCase().includes(q) ||
    (c.chart?.cc||'').toLowerCase().includes(q)
  );
  renderList(filtered);
};

function renderList(cases){
  const list = document.getElementById('case-list');
  const lbl = document.getElementById('list-lbl');
  const countLbl = document.getElementById('count-lbl');

  countLbl.textContent = cases.length + ' case' + (cases.length !== 1 ? 's' : '');
  lbl.textContent = cases.length + ' Past Case' + (cases.length !== 1 ? 's' : '');

  if(cases.length === 0){
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🗂️</div>
        <div class="empty-title">No cases found</div>
        <div class="empty-sub">Try adjusting your search.</div>
      </div>`;
    return;
  }

  list.innerHTML = '';
  cases.forEach(c => {
    const parts = (c.date||'').split('-');
    const mon = MONTHS[parseInt(parts[1])-1] || '';
    const day = parseInt(parts[2]) || '';
    const year = parts[0] || '';

    const row = document.createElement('div');
    row.className = 'case-row';
    row.innerHTML = `
      <div class="date-badge">
        <div class="date-mon">${mon}</div>
        <div class="date-day">${day}</div>
        <div class="date-year">${year}</div>
      </div>
      <div class="case-info">
        <div class="case-title">${c.title || c.patient?.name || 'Untitled Case'}</div>
        <div class="case-meta">${c.patient?.name || ''}${c.patient?.age ? ', ' + c.patient.age : ''}${c.patient?.sex || ''} &mdash; ${c.patient?.occupation || ''}</div>
        <div class="case-tag">${c.urgency ? c.urgency.toUpperCase() : 'STABLE'}</div>
      </div>
      <button class="case-play-btn">Play →</button>
    `;
    row.onclick = () => window.location.href = 'index.html?date=' + c.date;
    list.appendChild(row);
  });
}

// Apply day/night background
function applyTimeTheme(){
  const hr = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Chicago'})).getHours();
  const isNight = hr >= 18 || hr < 6;
  document.getElementById('bg').style.backgroundImage = isNight
    ? "url('https://res.cloudinary.com/djiap51xq/image/upload/q_auto/f_auto/v1775527250/night_pi7sfg.png')"
    : "url('https://res.cloudinary.com/djiap51xq/image/upload/q_auto/f_auto/v1775527232/background_ui_tl1rgz.png')";
}

applyTimeTheme();
loadCases();
</script>
</body>
</html>
